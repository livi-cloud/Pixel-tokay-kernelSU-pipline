name: Build Pixel 9 KernelSU
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        temp-reserve-mb: 2048
        swap-size-mb: 8192
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git bc bison flex libssl-dev \
          libelf-dev python3 python-is-python3 make \
          gcc-aarch64-linux-gnu repo

    - name: Cache kernel source
      uses: actions/cache@v4
      id: cache-source
      with:
        path: kernel_src
        key: kernel-src-caimito-android16

    - name: Sync kernel source
      if: steps.cache-source.outputs.cache-hit != 'true'
      run: |
        mkdir -p kernel_src && cd kernel_src
        repo init \
          -u https://android.googlesource.com/kernel/manifest \
          -b android-gs-caimito-6.1-android16 \
          --depth=1
        repo sync -j$(nproc) --no-tags

    - name: Integrate KernelSU v3.2.0
      run: |
            cd kernel_src/aosp
            git clone --branch v3.2.0 \
              https://github.com/tiann/KernelSU.git \
              /tmp/KernelSU
            cp -r /tmp/KernelSU/kernel drivers/kernelsu
            grep -qxF 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig \
              || echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
            grep -qxF 'obj-$(CONFIG_KSU) += kernelsu/' drivers/Makefile \
              || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
            sed -i '1i ccflags-y += -DKSU_VERSION=11956' drivers/kernelsu/Makefile

    - name: Apply kernel config
      run: |
        cd kernel_src/aosp
        CONFIG=arch/arm64/configs/gki_defconfig
        grep -qxF "CONFIG_KSU=y" $CONFIG || echo "CONFIG_KSU=y" >> $CONFIG

    - name: Build kernel
      run: |
        cd kernel_src
        BUILD_AOSP_KERNEL=1 ./build_caimito.sh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pixel9-kernelsu-${{ github.sha }}
        path: kernel_src/out/android-gs-pixel-6.1/dist/boot.img
        retention-days: 7
